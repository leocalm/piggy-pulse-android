name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Compose UI E2E (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      db-e2e:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: piggy_pulse_e2e_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

      backend-e2e:
        image: ghcr.io/leocalm/piggy-pulse-api:latest
        env:
          DATABASE_URL: postgres://postgres:postgres@db-e2e:5432/piggy_pulse_e2e_db
          PIGGY_PULSE_DATABASE__URL: postgres://postgres:postgres@db-e2e:5432/piggy_pulse_e2e_db
          PIGGY_PULSE_DATABASE__MAX_CONNECTIONS: 10
          PIGGY_PULSE_DATABASE__MIN_CONNECTIONS: 1
          PIGGY_PULSE_SERVER__ADDRESS: 0.0.0.0
          PIGGY_PULSE_SERVER__PORT: 8000
          PIGGY_PULSE_API__BASE_PATH: /v1
          PIGGY_PULSE_CORS__ALLOWED_ORIGINS: '["http://10.0.2.2:18080"]'
          PIGGY_PULSE_CORS__ALLOW_CREDENTIALS: "false"
          PIGGY_PULSE_SESSION__COOKIE_SECURE: "false"
          PIGGY_PULSE_EMAIL__ENABLED: "false"
          PIGGY_PULSE_TWO_FACTOR__ENCRYPTION_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
          ROCKET_SECRET_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          ROCKET_ADDRESS: 0.0.0.0
          ROCKET_PORT: 8000
        options: >-
          --health-cmd "curl -sf http://localhost:8000/v2/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
        ports:
          - 18080:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || echo "KVM not available"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for API health
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:18080/v2/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" -eq 60 ]; then
              echo "API failed to start" && exit 1
            fi
          done

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done;' || true
            sleep 10
            ./gradlew connectedAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=com.piggypulse.android.e2e.tests.AuthTests,com.piggypulse.android.e2e.tests.StructureTests,com.piggypulse.android.e2e.tests.TransactionTests \
              -Pandroid.testInstrumentationRunnerArguments.useTestStorageService=false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
          retention-days: 14
